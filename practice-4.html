<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>가보고 싶은 나라</title>
    <style>
        h3{
            font-size:30px;
        }
        ul{
            background-color:aliceblue;
            background-image:png("worldmap.png")
        }
        li{
            padding-right:10px;
            margin:10px;
            font-size:25px;
        }
        li:hover{
            background-color:yellowgreen;
            color:black;
        }
    </style>
</head>
<body>
    <h3>가보고 싶은 나라</h3>
    <hr>
    <ul>
        <li>프랑스</li>
        <li>영국</li>
        <li>미국</li>
    </ul>
</body>
</html>
