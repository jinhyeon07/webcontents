<html>
<head>
    <meta charset="utf-8">
    <title>설문조사</title>
</head>
<body>
    <h3>설문지</h3>
    <form>
        학년:<br>
        <input type="radio" name="grade" value="1"checked>1학년<br>
        <input type="radio" name="grade" value="2" >2학년<br>
        <input type="radio" name="grade" value="3">3학년<br><br>

        성별:<br>
        <input type="radio" name="sex" value="1"checked>남<br>
        <input type="radio" name="sex" value="2" >여<br><br>

        관심 분야:<br>
        <select name="interested_field">
            <option value="1">축구</option>
            <option value="2" selected>게임</option>
            <option value="3">독서</option>
            <option value="4">음악감상</option>
        </select><br><br>

        <p>진로</p>
        마케팅<input type="checkbox" value="1">
        개발자<input type="checkbox" value="2" checked>
        기획<input type="checkbox" value="3">
        <p>남기고 싶은 말</p>
     <textarea name="comment" rows="10" cols="50" placeholder="글을 남겨주세요"></textarea>
    </form>
</body>
</html>
