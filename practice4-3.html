<html>
<head>
    <meta charset="utf-8">
    <title>색 테이블 만들기</title>
    <style>
        #brown{background-color:brown;width:50px; height:20px;}
        #blueviolet{background-color:blueviolet; widht:50px; height:20px;}
        #darkorange{background-color:darkorange; widht:50px; height:20px;}
        #gold{background-color:gold;widht:50px; height:20px;}
        #olivedrab{background-color:olivedrab;widht:50px; height:20px;}
    </style>
</head>
<body>
    <h3>색 이름과 코드</h3>
    <hr>
    <table border="1">
        <thead>
            <tr><td>이름</td><td>코드</td><td>색</td><td>이름</td><td>코드</td><td>색</td></tr>
        </thead>
        <tbody>
            <tr><td>brown</td><td>#A52A2A</td><td><div id="brown"></div></td><td>deepsky</td><td>#00BFFF</td><td><div id="deepsky"></div></td></tr>
            <tr><td>blueviolet</td><td>#8A2BE2</td><td><div id="blueviolet"></div></td><td>gold</td><td>#FFD700</td><td><div id="gold"></td></tr>
            <tr><td>darkorange</td><td>#FF8C00</td><td><div id="darkorange"></div></td><td>olivedrab</td><td>#6B8E23</td><td><div id="olivedrab"></div></td></tr>
        </tbody>
    </table>
</body>
</html>
