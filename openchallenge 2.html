<HTML>
    <head>
        <meta charset="utf-8">
    <title>설문지 만들기</title>
    <p>소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.</p>
   
    </head>
     <body>
        <h3>설문지</h3>
        <hr>
        <form>
            <input type="radio" name="grade"value="1">1학년<br>
            <input type="radio" name="grade"value="2"checked>2학년<br>
            <input type="radio" name="grade"value="3">3학년<br>  
        </form>
     </body>
     <body>
        <form>
            <input type="radio" name="sex"value="1">남<br>
            <input type="radio" name="sex"value="2"checked>여<br> 
        </form>
     </body>
     <body>
        <form>
            <select name="interested field">
                <option value="1">축구</option>
                <option value="2" selected>게임</option>
                <option value="3">독서</option>
                <option value="4">음악감상</option>
            </select>
        </form>
     </body>
     

  
</HTML>
